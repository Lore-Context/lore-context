<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Lore Memory Capture</title>
  <style>
    body {
      width: 280px;
      padding: 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: #111827;
    }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .logo { font-weight: bold; font-size: 18px; color: #2563eb; }
    .source { font-size: 12px; color: #4b5563; }
    .status { margin-bottom: 12px; font-size: 13px; }
    .status-badge {
      display: inline-block;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: bold;
      text-transform: uppercase;
    }
    .status-ok { background: #dcfce7; color: #166534; }
    .status-paused { background: #fef3c7; color: #92400e; }
    .status-unauth { background: #f3f4f6; color: #374151; }
    .meta { font-size: 11px; color: #6b7280; margin-bottom: 6px; }
    .meta span { color: #111827; }
    .controls button {
      width: 100%;
      padding: 8px;
      margin-bottom: 6px;
      cursor: pointer;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      background: #fff;
      font-size: 13px;
    }
    .controls button:hover { background: #f9fafb; }
    .footer { font-size: 11px; color: #6b7280; margin-top: 10px; text-align: center; }
    .footer a { color: #2563eb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">Lore</div>
    <div class="source" id="source-label">—</div>
  </div>

  <div class="status">
    Status: <span id="status-text" class="status-badge status-unauth">Checking...</span>
  </div>

  <div class="meta">Last capture: <span id="last-capture">—</span></div>
  <div class="meta">Last error: <span id="last-error">none</span></div>

  <div class="controls">
    <button id="auth-btn">Authorize this site</button>
    <button id="revoke-btn">Revoke authorization</button>
    <button id="pause-btn">Pause Capture</button>
    <button id="private-btn">Enable Private</button>
    <button id="review-btn">Review in Lore</button>
    <button id="options-btn">Settings</button>
  </div>

  <div class="footer">v1.0.0-rc.2 · summary-only by default</div>

  <script src="popup.js"></script>
</body>
</html>
