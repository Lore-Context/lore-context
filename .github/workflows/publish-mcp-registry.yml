name: Publish MCP Registry

on:
  workflow_dispatch:
    inputs:
      version:
        description: MCP server version to publish
        required: true
        default: 0.6.0-alpha.1

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/lore-context/lore-context-mcp
      MCP_SERVER_NAME: io.github.Lore-Context/lore-context-mcp
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify server metadata version
        run: |
          test "$(jq -r '.version' server.json)" = "${{ inputs.version }}"
          test "$(jq -r '.packages[] | select(.registryType == "oci") | .identifier' server.json)" = "${IMAGE}:${{ inputs.version }}"
          test "$(jq -r '.packages[] | select(.registryType == "npm") | .identifier' server.json)" = "@lore-context/server"
          test "$(jq -r '.packages[] | select(.registryType == "npm") | .version' server.json)" = "${{ inputs.version }}"

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build MCP OCI image
        run: docker build -t "${IMAGE}:${{ inputs.version }}" .

      - name: Verify MCP OCI image
        run: |
          label="$(docker image inspect "${IMAGE}:${{ inputs.version }}" --format '{{ index .Config.Labels "io.modelcontextprotocol.server.name" }}')"
          test "$label" = "$MCP_SERVER_NAME"
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-11-25","capabilities":{},"clientInfo":{"name":"gha","version":"0"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | docker run --rm -i -e LORE_API_URL=http://host.docker.internal:3000 "${IMAGE}:${{ inputs.version }}" \
            | tee /tmp/mcp-smoke.jsonl
          grep -q '"context_query"' /tmp/mcp-smoke.jsonl
          grep -q '"trace_get"' /tmp/mcp-smoke.jsonl

      - name: Push MCP OCI image
        run: docker push "${IMAGE}:${{ inputs.version }}"

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
          ./mcp-publisher --help

      - name: Validate server.json
        run: ./mcp-publisher validate

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
