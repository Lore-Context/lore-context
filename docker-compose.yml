services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: lore-context-postgres
    environment:
      POSTGRES_DB: lore_context
      POSTGRES_USER: lore
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?must be set}
    ports:
      - "5432:5432"
    volumes:
      - lore-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lore -d lore_context"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  lore-postgres:
